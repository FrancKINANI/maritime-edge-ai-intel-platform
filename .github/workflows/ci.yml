name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check services/ phase0/ shared/

  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify project structure
        run: |
          test -f docker-compose.yml
          test -f .env.example
          test -f Makefile
          test -d services/data-ingestor
          test -d services/sentinel-preprocessor
          test -d services/detector
          test -d services/satellite-monitor
          test -d services/aggregator
          test -d services/ground-dashboard
          test -d phase0
          test -d shared
          echo "Structure OK"
