name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check services/ phase0/ shared/

  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify project structure
        run: |
          test -f docker-compose.yml
          test -f .env.example
          test -f Makefile
          test -d services/data-ingestor
          test -d services/sentinel-preprocessor
          test -d services/detector
          test -d services/satellite-monitor
          test -d services/aggregator
          test -d services/ground-dashboard
          test -d phase0
          test -d shared
          echo "Structure OK"

  tests:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        suite:
          - phase0/tests/
          - services/sentinel-preprocessor/tests/
          - services/aggregator/tests/
          - services/detector/tests/
          - services/satellite-monitor/tests/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install system dependencies (detector)
        if: ${{ contains(matrix.suite, 'detector') }}
        run: |
          sudo apt-get update && sudo apt-get install -y libgl1-mesa-glx
      - name: Install test requirements
        run: |
          pip install -r services/sentinel-preprocessor/requirements.txt
          pip install -r services/aggregator/requirements.txt
          pip install -r services/data-ingestor/requirements.txt
          pip install -r services/detector/requirements.txt
          pip install -r services/satellite-monitor/requirements.txt
          pip install -r phase0/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run unit tests — ${{ matrix.suite }}
        run: |
          python -m pytest ${{ matrix.suite }} -v --tb=short
