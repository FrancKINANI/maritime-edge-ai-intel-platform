name: CI — Maritime Intelligence Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linters
        run: pip install ruff bandit
      - name: Ruff check
        run: ruff check services/ phase0/ shared/
      - name: Bandit SAST scan
        run: |
          bandit -r services/ -f sarif -o bandit-results.sarif || true
          bandit -r phase0/ --quiet || true
      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit
        continue-on-error: true

  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify project structure
        run: |
          echo "=== Docker base image ==="
          test -f docker/base/Dockerfile && echo "  ✅ Base"
          echo "=== Core services ==="
          for d in services/data-ingestor services/sentinel-preprocessor services/detector \
                   services/satellite-monitor services/aggregator services/ground-dashboard; do
            test -d "$d" && echo "  ✅ $d" || exit 1
          done
          echo "=== Tests ==="
          for d in services/data-ingestor/tests services/aggregator/tests services/detector/tests \
                   services/satellite-monitor/tests services/sentinel-preprocessor/tests shared/tests; do
            test -d "$d" && echo "  ✅ $d"
          done
          echo "Structure OK"

  tests:
    runs-on: ubuntu-latest
    needs: [lint-and-sast]
    strategy:
      matrix:
        suite:
          - phase0/tests/
          - services/sentinel-preprocessor/tests/
          - services/aggregator/tests/
          - services/detector/tests/
          - services/satellite-monitor/tests/
          - services/data-ingestor/tests/
          - shared/tests/
          - tests/integration/
          - tests/ground_dashboard/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install system deps
        if: ${{ contains(matrix.suite, 'detector') }}
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
      - name: Install test dependencies
        run: |
          pip install -r services/sentinel-preprocessor/requirements.txt \
                      -r services/aggregator/requirements.txt \
                      -r services/data-ingestor/requirements.txt \
                      -r services/detector/requirements.txt \
                      -r services/satellite-monitor/requirements.txt \
                      -r phase0/requirements.txt \
                      -r docker/base/requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          python -m pytest ${{ matrix.suite }} \
            -v --tb=short --timeout=60 \
            --cov=. --cov-append --cov-report=term

  coverage-check:
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check minimum coverage
        run: |
          pip install coverage
          coverage report --fail-under=60 2>/dev/null || echo "Coverage check (non-blocking)"
