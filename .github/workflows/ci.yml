name: CI — Maritime Intelligence Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # needed to upload SARIF results to GitHub Code Scanning
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff bandit
      - name: Ruff check
        run: ruff check services/ research/ shared/
      - name: Bandit SAST scan
        run: |
          bandit -r services/ -f sarif -o bandit-results.sarif || true
          bandit -r research/ --quiet || true
      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit
        continue-on-error: true

  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify project structure
        run: |
          echo "=== Docker base image ==="
          test -f docker/base/Dockerfile && echo "  ✅ Base"
          echo "=== Core services ==="
          for d in services/data_ingestor services/sentinel_preprocessor services/detector \
                   services/satellite_monitor services/aggregator services/ground_dashboard; do
            test -d "$d" && echo "  ✅ $d" || exit 1
          done
          echo "=== Tests ==="
          for d in services/data_ingestor/tests services/aggregator/tests services/detector/tests \
                   services/satellite_monitor/tests services/sentinel_preprocessor/tests \
                   services/ground_dashboard/tests shared/tests research/tests; do
            test -d "$d" && echo "  ✅ $d"
          done
          echo "Structure OK"

  tests:
    runs-on: ubuntu-latest
    needs: [lint-and-sast]
    strategy:
      fail-fast: false
      matrix:
        suite:
          - research/tests/
          - services/sentinel_preprocessor/tests/
          - services/aggregator/tests/
          - services/detector/tests/
          - services/satellite_monitor/tests/
          - services/data_ingestor/tests/
          - shared/tests/
          - tests/integration/
          - services/ground_dashboard/tests/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        if: ${{ contains(matrix.suite, 'detector') }}
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
      - name: Install test dependencies
        run: |
          pip install                      -r services/sentinel_preprocessor/requirements.txt \
                      -r services/aggregator/requirements.txt \
                      -r services/data_ingestor/requirements.txt \
                      -r services/detector/requirements.txt \
                      -r services/satellite_monitor/requirements.txt \
                      -r docker/base/requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
      - name: Install research dependencies
        if: contains(matrix.suite, 'research')
        run: pip install scipy python-dotenv tqdm
      - name: Debug research environment
        if: contains(matrix.suite, 'research')
        run: |
          echo '=== Python version ==='
          python --version
          echo '=== Installed packages ==='
          pip list 2>&1 | head -40
          echo '=== Import tests ==='
          python -c "from dotenv import load_dotenv; print('dotenv OK')" 2>&1 || echo 'FAIL: dotenv'
          python -c "from tqdm import tqdm; print('tqdm OK')" 2>&1 || echo 'FAIL: tqdm'
          python -c "from scipy.interpolate import RegularGridInterpolator; print('scipy OK')" 2>&1 || echo 'FAIL: scipy'
          echo '=== Import research modules ==='
          cd $GITHUB_WORKSPACE
          export PYTHONPATH=.
          python -c "import sys; sys.path.insert(0, 'research/scripts'); import download_scenes; print('download_scenes OK')" 2>&1 || echo 'FAIL: download_scenes'
          python -c "import sys; sys.path.insert(0, '.'); from research.scripts.gfw_annotations import GFWClient; print('gfw_annotations OK')" 2>&1 || echo 'FAIL: gfw_annotations'
          python -c "import sys; sys.path.insert(0, '.'); from research.scripts.sar_preprocessing import GCPGeoreferencer; print('sar_preprocessing OK')" 2>&1 || echo 'FAIL: sar_preprocessing'
          echo '=== Test collection ==='
          python -m pytest research/tests/ --collect-only -q 2>&1 || echo 'COLLECTION FAILED'
      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          python -m pytest ${{ matrix.suite }} \
            -v --tb=short --timeout=60 \
            --cov=. --cov-append --cov-report=term

  coverage-check:
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check minimum coverage
        run: |
          pip install coverage
          coverage report --fail-under=60 2>/dev/null || echo "Coverage check (non-blocking)"

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
          skip-dirs: research/data,research/dataset_finetune
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true
