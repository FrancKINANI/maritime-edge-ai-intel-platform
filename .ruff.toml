# Ruff configuration for the maritime intelligence platform
# Target: Python 3.11+

target-version = "py311"
line-length = 120

exclude = ["*.ipynb", "coverage_html", "phase0/data", "phase_post0"]

[lint]
# S = flake8-bandit, I = isort, N = pep8-naming, D = pydocstyle
select = [
    "E", "F", "W",         # Core (pycodestyle + Pyflakes)
    "I",                   # isort (import ordering)
    "N",                   # pep8-naming
    "UP",                  # pyupgrade
    "S",                   # flake8-bandit (security)
    "B",                   # flake8-bugbear
    "SIM",                 # flake8-simplify
]
ignore = [
    "S101",                # allow assert
    "S603",                # allow subprocess (controlled context)
    "S311",                # allow random (non-cryptographic uses)
    "N806",                # allow non-lowercase variable names in functions
    "N803",                # allow uppercase argument names
    "D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107",  # docstrings — not enforced
]

[lint.per-file-ignores]
"services/**/main.py" = ["S310"]  # HTTP URLs allowed for internal service calls
"phase0/scripts/*.py" = ["S310", "S311", "S607", "S301"]
"phase0/notebooks/*.py" = ["S310", "S311", "S607"]
"tests/**" = ["S101", "S311"]
"shared/**" = ["S310"]

[lint.mccabe]
max-complexity = 15

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
